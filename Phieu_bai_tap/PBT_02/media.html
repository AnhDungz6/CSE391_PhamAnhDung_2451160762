<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giới thiệu sản phẩm</title>
  </head>
  <body>
    <h1>Trang giới thiệu sản phẩm</h1>

    <h2>Logo thương hiệu</h2>
    <svg width="100" height="100">
      <rect x="10" y="10" width="80" height="80" fill="green" />
      <text x="50" y="55" text-anchor="middle" fill="white" font-size="18">
        ADZ
      </text>
    </svg>

    <h2>Sản phẩm nổi bật</h2>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
        alt="Áo thun thời trang màu trắng"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Áo thun thời trang</figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
        alt="Giày thể thao Nike"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Giày thể thao</figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1511376777868-611b54f68947"
        alt="Đồng hồ đeo tay cao cấp"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Đồng hồ đeo tay</figcaption>
    </figure>

    <h2>Video giới thiệu</h2>
    <iframe
      width="100%"
      height="400"
      src="https://www.youtube.com/embed/NWFa-ClI_vg?si=qnDan0oSe3fTvLYH"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    >
    </iframe>

    <h2>Video sản phẩm</h2>
    <video
      controls
      poster="https://images.unsplash.com/photo-1492724441997-5dc865305da7"
      width="100%"
    >
      <source
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        type="video/mp4"
      />
      <source
        src="https://www.w3schools.com/html/mov_bbb.webm"
        type="video/webm"
      />
      Trình duyệt của bạn không hỗ trợ video.
    </video>

    <h2>Nhạc nền</h2>
    <audio controls>
      <source
        src="https://www.w3schools.com/html/horse.mp3"
        type="audio/mpeg"
      />
      Trình duyệt của bạn không hỗ trợ audio.
    </audio>
  </body>
</html>
