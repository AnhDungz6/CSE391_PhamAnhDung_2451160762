<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <div class="main-layout">
      <header class="header">
        <div class="logo">ANHDUNG SHOP</div>
        <nav>Home | Products | Contact</nav>
      </header>

      <section class="hero">
        <div class="hero-content">
          <h1>Siêu Sale Mùa Hè!</h1>
          <p>Giảm giá đến 50% cho tất cả các mặt hàng công nghệ.</p>
        </div>

        <div class="featured-product">
          <span> Nổi bật</span>
          <h3>iPhone 15 Pro Max</h3>
          <button>Xem ngay</button>
        </div>
      </section>

      <aside class="sidebar">
        <h3>Bộ lọc</h3>
        <div class="filter-group">
          <p>Khoảng giá</p>
          <label><input type="checkbox" /> Dưới 5tr</label>
          <label><input type="checkbox" /> 5tr - 15tr</label>
          <label><input type="checkbox" /> Trên 15tr</label>
        </div>
        <div class="filter-group">
          <p>Thương hiệu</p>
          <label><input type="checkbox" /> Apple</label>
          <label><input type="checkbox" /> Samsung</label>
        </div>
      </aside>

      <main class="main-content">
        <div class="product-grid">
          <div class="card">Sản phẩm 1</div>
          <div class="card">Sản phẩm 2</div>
          <div class="card">Sản phẩm 3</div>
          <div class="card">Sản phẩm 4</div>
          <div class="card">Sản phẩm 5</div>
          <div class="card">Sản phẩm 6</div>
        </div>
      </main>

      <aside class="ads">
        <div class="ad-placeholder">
          <p>Quảng cáo</p>
          <img
            src="https://i.pinimg.com/736x/bf/30/46/bf3046a341163f1391fc187613f9f15e.jpg"
            alt="Ads"
          />
        </div>
      </aside>

      <footer class="footer">
        <p>&copy; 2026 AnhDung Shop - All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
